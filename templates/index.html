<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Core SEO Tags -->
    <title>DownDrive | High-Fidelity Media Downloader</title>
    <meta name="description" content="High-fidelity, cross-platform media extraction. Download videos and audio from TikTok and Instagram entirely free without ads or watermarks.">
    <meta name="keywords" content="video downloader, tiktok downloader, free mp4, high quality download, no watermark, instagram video saver">
    <meta name="author" content="DRGM.DEV">
    
    <!-- Open Graph for Social Media Link Previews -->
    <meta property="og:title" content="DownDrive | High-Fidelity Media Downloader">
    <meta property="og:description" content="High-fidelity, cross-platform media extraction without popups or ads.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://downdrive.drgm.dev">
    
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <!-- Modern premium font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Dynamic animated backgrounds -->
    <div class="blob-wrapper">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container glass-card">
        <header class="card-header">
            <h1 class="brand"><span class="accent">Down</span>Drive<span class="accent">.</span></h1>
            <p class="subtitle">High-Fidelity Media Extraction</p>
        </header>
        
        <main>
            <div class="input-container">
                <i class="fa-solid fa-link icon"></i>
                <input type="text" id="url" placeholder="Paste video link here" autocomplete="off">
            </div>
            
            <div class="format-selection">
                <label class="radio-tab">
                    <input type="radio" name="format" value="video" checked>
                    <div class="tab-content">
                        <i class="fa-solid fa-video"></i>
                        <span>Video (MP4)</span>
                    </div>
                </label>
                <label class="radio-tab">
                    <input type="radio" name="format" value="audio">
                    <div class="tab-content">
                        <i class="fa-solid fa-music"></i>
                        <span>Audio (MP3)</span>
                    </div>
                </label>
            </div>
            
            <button id="download-btn" class="action-btn">
                <span class="btn-text">Extract Source</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-download">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" x2="12" y1="15" y2="3"/>
                </svg>
            </button>
            
            <div id="status-panel" class="status-panel hidden">
                <div class="media-title">
                    <i class="fa-brands fa-youtube" style="color: #ff0000;"></i>
                    <i class="fa-brands fa-tiktok" style="color: #ffffff;"></i>
                    <i class="fa-brands fa-instagram" style="color: #E1306C;"></i>
                    <h3 id="video-title" class="truncate" style="margin-left: 8px;">Analyzing media...</h3>
                </div>
                
                <div class="tracker">
                    <div class="progress-bar-bg">
                        <div id="progress-bar" class="progress-bar-fill"></div>
                    </div>
                    
                    <div class="stats-row">
                        <div class="stat"><i class="fa-solid fa-percent"></i> <span id="percent">0%</span></div>
                        <div class="stat"><i class="fa-solid fa-gauge-high"></i> <span id="speed">--</span></div>
                        <div class="stat"><i class="fa-solid fa-clock"></i> <span id="eta">--:--</span></div>
                    </div>
                    
                    <div class="status-msg" id="status-text">Starting injection protocol...</div>
                </div>
            </div>
        </main>
        
        <div class="desktop-promo" style="text-align: center; margin-top: 16px; font-size: 0.75rem; color: var(--text-dim); padding: 0 10px; line-height: 1.4;">
            <span class="accent" style="font-weight: 600;">YouTube blocked?</span> <a href="https://github.com/DianeDoesDigital/DownDrive/archive/refs/heads/main.zip" style="color: #ffffff; text-decoration: underline; font-weight: 400;">Download the Native Desktop App for Mac & Windows.</a>
        </div>

        <div class="footer-brand">POWERED BY <a href="https://DRGM.dev" target="_blank" class="accent" style="text-decoration: none;">DRGM.DEV</a></div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
